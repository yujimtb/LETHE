name: Public Release Guard

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run public release audit
        run: python ./scripts/public_release_audit.py

      - name: Check dependency layers
        shell: pwsh
        run: ./scripts/check_dependency_layers.ps1

      - name: Check Markdown links
        run: python ./scripts/check_markdown_links.py

      - name: Verify OpenSpec review harness coverage
        run: cargo run -p lethe-review-harness -- verify --spec-root openspec/changes/review-harness/specs --evidence-root . --tasks-root openspec/changes/review-harness

      - name: Test workspace
        run: cargo test --workspace
