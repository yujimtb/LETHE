services:
  lethe-selfhost:
    build:
      context: ../..
      dockerfile: apps/selfhost/Dockerfile
    environment:
      RUST_LOG: info
      LETHE_CONFIG_PATH: /etc/lethe/config.toml
      LETHE_STORAGE_ENCRYPTION_KEY: ${LETHE_STORAGE_ENCRYPTION_KEY:?}
      LETHE_OPERATIONAL_STORAGE_ENCRYPTION_KEY: ${LETHE_OPERATIONAL_STORAGE_ENCRYPTION_KEY:?}
      LETHE_API_READ_TOKEN: ${LETHE_API_READ_TOKEN:?}
      LETHE_API_WRITE_TOKEN: ${LETHE_API_WRITE_TOKEN:?}
      LETHE_API_SYNC_TOKEN: ${LETHE_API_SYNC_TOKEN:?}
      LETHE_NANIHOLD_TOKEN: ${LETHE_NANIHOLD_TOKEN:?}
    ports:
      - "127.0.0.1:${LETHE_HTTP_HOST_PORT:?}:8080"
      - "127.0.0.1:${LETHE_MCP_HOST_PORT:?}:8090"
    volumes:
      - ./config.toml:/etc/lethe/config.toml:ro
      - ./mcp-jwks.json:/etc/lethe/mcp-jwks.json:ro
      - ./data:/var/lib/lethe
    restart: unless-stopped
